name: Autograding Tests

on:
  - push
  - repository_dispatch

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Case 01 - contoh resmi
        id: case-01
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 01 - contoh resmi
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "4 5 11000 11010 00101 00011"
          expected-output: |-
            ISLANDS 4
            LARGEST 4
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 02 - grid kosong semua
        id: case-02
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 02 - grid kosong semua
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "3 4 0000 0000 0000"
          expected-output: |-
            ISLANDS 0
            LARGEST 0
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 03 - satu sel aktif
        id: case-03
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 03 - satu sel aktif
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "1 1 1"
          expected-output: |-
            ISLANDS 1
            LARGEST 1
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 04 - satu sel kosong
        id: case-04
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 04 - satu sel kosong
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "1 1 0"
          expected-output: |-
            ISLANDS 0
            LARGEST 0
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 05 - satu pulau penuh
        id: case-05
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 05 - satu pulau penuh
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "2 3 111 111"
          expected-output: |-
            ISLANDS 1
            LARGEST 6
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 06 - diagonal tidak terhubung
        id: case-06
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 06 - diagonal tidak terhubung
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "3 3 100 010 001"
          expected-output: |-
            ISLANDS 3
            LARGEST 1
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 07 - dua pulau ukuran beda
        id: case-07
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 07 - dua pulau ukuran beda
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "3 5 11000 11000 00111"
          expected-output: |-
            ISLANDS 2
            LARGEST 4
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 08 - banyak pulau kecil
        id: case-08
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 08 - banyak pulau kecil
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "4 4 1010 0000 0101 1000"
          expected-output: |-
            ISLANDS 5
            LARGEST 1
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 09 - satu pulau berkelok
        id: case-09
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 09 - satu pulau berkelok
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "4 4 1110 0010 0110 0100"
          expected-output: |-
            ISLANDS 1
            LARGEST 7
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 10 - dua pulau sama besar
        id: case-10
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 10 - dua pulau sama besar
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "3 6 111000 111000 000111"
          expected-output: |-
            ISLANDS 2
            LARGEST 6
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          CASE-01_RESULTS: "${{steps.case-01.outputs.result}}"
          CASE-02_RESULTS: "${{steps.case-02.outputs.result}}"
          CASE-03_RESULTS: "${{steps.case-03.outputs.result}}"
          CASE-04_RESULTS: "${{steps.case-04.outputs.result}}"
          CASE-05_RESULTS: "${{steps.case-05.outputs.result}}"
          CASE-06_RESULTS: "${{steps.case-06.outputs.result}}"
          CASE-07_RESULTS: "${{steps.case-07.outputs.result}}"
          CASE-08_RESULTS: "${{steps.case-08.outputs.result}}"
          CASE-09_RESULTS: "${{steps.case-09.outputs.result}}"
          CASE-10_RESULTS: "${{steps.case-10.outputs.result}}"
        with:
          runners: case-01,case-02,case-03,case-04,case-05,case-06,case-07,case-08,case-09,case-10
